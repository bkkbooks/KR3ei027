body:
  text: 卷之三胎前門胎前用藥大法歌婦人初妊最難看惡食貪眠或嗜酸母病則須先療母因胎即便把胎安論王海藏曰安胎之法有二如母病以致動胎但療母而胎自安也若胎氣不固或有所觸動以致母病者宜安胎則母自愈矣胎前氣血和平則百病不生若氣旺而熱熱則耗血而胎不安治當清熱養血為主惟在起居飲食調理得宜絶去嗜欲安養胎氣雖有別症總以安胎為主胎前有三禁歌胎前三禁要須知利水相煎汗下時只為厥陰為祖氣若能不犯始為奇論張潔古曰婦女天癸未行屬少陰天癸即行屬厥陰天癸既絶屬太陰故治胎前從厥陰者是祖氣生化之原也厥陰與少陽相為表裡故治之無犯胃氣及上下二焦謂之三禁者不可汗不可下不可利小便若發汗則同傷寒下早證利大便則脈數而動於脾利小便則內亡津液而胃中枯燥用藥能不犯此三禁則榮衛和而寒熱自止矣胎前藥忌群隊歌胎前最忌藥成群識者須將氣血分氣病惟宜枳殼散血虛內補可為君論張子和曰治婦人病必先問月水及娠不可純用破氣行血之藥恐傷胎於疑似之間也許學士曰妊娠惟在抑陽助陰然胎前藥最忌群隊倘陰陽交錯別生他病唯南山道士枳殼散所以抑陽四物湯所以助陰但枳殼散少寒單服之恐有胎寒腹痛之患以內補丸佐之則陽不致強陰不致弱陰陽調和而胎自安矣方內補當歸丸當歸三兩熟地二兩酒蒸宜加杜仲續斷山藥砂仁炒蜜丸服胎前宜健脾養血開鬱補腎歌脾腎雖分先後天陰陽氣血總相兼瘦人過動宜清理自汗滋陰合自然怒氣傷肝常嘔逆胎元不運懶多眠惟宜開鬱安胎氣養血和中疾自痊論脾為後天之長腎為先天之原有孕則礙脾以致運化遲而生濕濕生熱故用白朮以健脾燥濕黃芩以清熱安胎此形瘦血熱營行過疾胎常上逼過動不安食少面黃倦怠無力者宜之若火旺口乾發熱自汗煩躁腹痛者又宜生地歸芍以養血也若性急多怒形實氣盛面黑胸滿嘔逆腹痛胎常不運者又宜砂仁香附以開之腎為衝任之根男子以藏精女子以系胞若腎虛腰軟腳膝無力又宜六味丸去丹皮加杜仲續斷故健脾養血開鬱補腎治雖不同然五行相生循環無端一以貫之總之使其氣血和平無過不及而已方安胎飲陳皮茯苓藿香砂仁當歸紫蘇甘草白朮黃芩大腹皮姜三片水煎服惡阻倍藿香陳皮加半夏胸膈不寬加枳殼去白朮惡寒倍蘇葉生薑去黃芩虛煩加麥冬知母去白朮子腫加山梔木通倍腹皮咳嗽加桑皮麥冬去白朮子淋加木通淡竹葉茯苓頭痛加川芎羌活防風腰痛加杜仲續斷補骨脂痢疾加黃連木香木通胸腹痛加香附白芍延胡泄瀉加澤瀉白朮茯苓傷寒無汗加羌防去苓術寒熱往來加柴胡蘇姜傷食加枳殼砂仁去苓術誤服毒藥加知母白扁豆胎動不安倍當歸砂仁胎不長加參耆歸術下血加阿膠艾葉芎歸胎太盛加黃楊腦陳皮胎氣上逼加砂仁蘇梗不眠加茯神棗仁竹葉胎氣下墜加川芎續斷血虛加白芍熟地瘧疾加柴胡知母胎欲墜加續斷杜仲芎歸臨産加川芎當歸安胎飲加減活法歌安胎飲里紫蘇甘大腹砂仁桔藿堪芩術歸苓姜水煮胎前諸症可相參惡阻停痰半夏宜茯苓甘草藿陳皮砂仁大腹同香附蘇葉生薑功最奇胸滿心疼號子懸蔥頭枳殼可同煎砂仁大腹甘蘇葉白朮黃芩應避嫌口渴虛煩加麥冬茯苓竹葉及防風山梔知母歸生地補血生津有大功腫脹皆因濕熱多健脾利水自安和木通苓澤姜皮術大腹陳皮及炒莎腰痛皆因腎氣虛須防孕子絶衣裾地黃杜脂芎山藥續斷當歸總載書咳嗽原來屬肺家要分虛實莫塗鴉虛將天麥阿膠等實用蘇陳桑杏砂往來寒熱屬於肝血少風邪勿誤看四物八珍醫血弱柴胡加減療風寒食傷水瀉損於脾下痢稠黏作熱醫熱則香連丸可治四苓香附茯陳皮不眠驚悸屬於心怔忡虛煩汗不禁遠志棗仁龍眼肉茯神柏子及人參觸犯胎元動不安縮砂末服是神丹或兼佛手同生地膠艾加之治血乾大抵胎前宜四物川芎用早恐升提地黃泥膈須加減順氣和中勿執迷脈法內經曰何以知懷子之且生也曰身有病而無邪脈也又曰婦人足少陰脈動甚者妊子也又曰陰搏陽別謂之有子秦越人曰三部浮沉正等按之不絶者有妊也崔紫虛曰陰搏於下陽別於上氣血調和有子之象手之少陰其脈動甚尺按不絶此為有孕少陰屬心心主血脈腎為胞門脈應於尺或寸脈微關滑尺數流利往來如雀之啄或診三部浮沉一止或平而虛當問月水婦人有病而無邪脈此孕非病所以不月齊仲甫曰陰搏陽別謂之有子氣血調和陽施陰化也王叔和曰脈平而虛妊子法也診其脈左少陰動甚者妊子也夫少陰心也心主血足少陰腎也腎主胞門大抵少陰經左手屬心右足屬腎下主乎尺尺中按之不絶者有妊也亦有元虛而微細濡弱或伏者脈訣舉要曰男女之別以左右取左疾為男右疾為女沉實在左浮大在右左男右女可以預剖蓋左脈疾勝於右是為男以男屬陽居左胎氣鍾於陽故左勝右脈疾勝於左是為女以女屬陰居右胎氣鍾於陰故右勝也大抵沉實者為男沉細者為女右尺浮大者固知其女左尺浮大者大約多男沉細是女沉實是男即所謂諸陽為男諸陰為女也右尺浮大為女左尺浮大為男即所謂左疾為男右疾為女也又曰中指一跳一止者一月胎二跳二止者二月胎也妊娠之脈如何認要辨陰陽衰與盛陰陽俱盛滑而和兩手調和數相應其人能食身無熱容色如常是妊定脈來左盛是男形右手偏洪是女孕孕真帶嘔頭昏悶此是停痰惡阻病急宜正胃與消痰固血安胎全兩命若還腰腹具脹時日暮咽乾潮熱盛多眠惡食倦昏痰此屬經凝卻非病胃脈疾數胎三月小腸但數五月母指下動急在大腸八月懷孕知其數大綱孕婦類如斯任意推詳審動靜婦人經自斷而有軀其脈反弦恐其後必大下不成軀也脈來近去遠故曰反以為有軀而反斷此為有陽無陰故也惡阻歌惡阻生於二月時心煩悶亂食難施胚胎經隧多壅塞濁氣攻衝運化遲氣鬱停痰兼胃實虛寒肝火併憂思大都止嘔調脾胃順氣和中最得宜論惡阻者謂妊娠吐嘔噁心頭眩惡食擇食是也産寶謂之子病巢氏謂之惡阻陳良甫謂胃氣怯弱中脘停痰脈息和順但四肢沉重頭眩擇食惟嗜酸鹹甚者寒熱嘔吐胸膈煩滿半夏茯苓丸張仲景曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠於法六十日當有此症設有醫者治逆卻一月加吐下者則絶之金匱要略曰妊娠嘔吐不止乾薑人參半夏丸脈嘔吐痰水寸必沉滑澀郁遲寒微虛數熱怒氣傷肝脈弦而弱或虛或實有力無力痰水惡阻多因胃有痰飲隨氣上亦相參二陳砂藿堪和胃若喜酸嘗主是男戴復庵曰胎前惡阻見物嘔吐嗜酸鹹物多臥少起俗名病鬼蓋其人宿有痰飲血壅遏而不行飲隨氣上停滯肝經故喜酸物金能剋木以辛勝之小半夏茯苓湯主之或二陳湯砂仁藿香虛寒胃虛令人常吐食胃冷無緣納水漿二者必然脈遲細人參半夏與乾薑肝火小腹平明氣上衝因而鬱塞滿胸中厥陰相火衝於胃茹橘蘆根用總同羅大無曰妊娠三月嘔吐惡阻每至寅卯時覺小腹有氣上衝然後膈滿而吐此肝火挾衝脈之火上衝也用沉香磨水化抱龍丸一服胸膈氣不升吐自止也氣鬱氣鬱中焦嘔吐生頭眩胸滿脹非輕脈來左手弦而弱苓半煎湯下抑青朱丹溪曰嘔吐暈眩脈左弦而弱此惡氣因怒氣所激肝氣傷乃挾胎氣上逆參朮補之非也宜半夏茯苓湯下抑青丸或砂仁炒為末淡薑湯調服二錢胃實氣血成胎二月間中焦壅塞不能還必然穢濁攻於胃水穀如何得下關蘆根湯丹溪曰妊娠嘔逆不食心煩悶亂乃是氣血積聚以養胎元精血內郁穢濁之氣上攻於胃宜陳皮半夏湯用藥大法李茂翁曰左脈弱而嘔服諸藥不止者當服理血歸原藥則愈矣經曰無陰則嘔是也歸原散薛立齊曰中脘停痰二陳湯加枳殼若飲食停滯六君子湯加枳殼若脾胃虛弱異功散胃氣不足人參桔皮湯氣惱加枳殼胸脅痞悶加蘇梗脅痛加柴胡飲食少思六君子加枳殼蘇梗頭暈體倦六君子脾胃虛弱嘔吐不食半夏茯苓湯加白朮蓋白朮茯苓半夏陳皮砂仁善能安胎氣健脾胃豫常用驗矣故王子亨白朮散局方人參丁香散楊振人參桔皮湯齊自明醒脾飲不用半夏亦可方半夏茯苓丸茯苓半夏桔皮枳殼人參甘草乾薑蜜丸每服二十丸肘後方無薑半只五品乾薑人參半夏丸乾薑人參各一兩半夏二兩生薑汁糊丸砂仁湯下橘皮竹茹湯橘皮竹茹茯苓半夏生薑水煎服忌羊雞魚面蘆根湯生蘆根桔皮生薑大腹皮枇杷葉水煎歸原散人參白朮茯苓陳皮半夏桔梗甘草枳殼川芎當歸白芍丁香薑棗水煎半夏茯苓湯半夏茯苓生薑桔皮人參旋覆花白芍甘草川芎桔梗細辛生地如熱去細辛加知母瀉去生地二服後服茯苓丸二香散香附一兩藿香五錢甘草二錢為末砂仁湯調服二錢子煩歌內心焦煩號子煩金為火爍是根源心煩肺熱多消渴若是胸煩嘔吐翻鬱悶不舒胎氣熱但煩無疾是虛煩若兼恍惚心驚悸竹葉門冬不可喧論妊娠苦煩悶者以四月受少陰君火以養精六月受少陽相火以養氣若母心驚膽寒有鬱悶名子煩也産寶曰子煩有四證有中心煩有胸中煩有産煩有子煩皆熱也肺虛而火乘之則心煩也停痰積飲而嘔吐涎沫惡聞食氣胸中煩也但熱而煩似無疾者虛煩也氣血停積虛熱相搏氣鬱不舒煩躁吐沫劇則胎動不安均為子煩也竹葉湯麥門冬飲氣滯紫蘇飲痰竹瀝湯脈子煩屬熱脈必洪數沉氣滑痰虛則無力方竹葉湯防風黃芩麥冬茯苓竹葉山梔當歸外臺祕要有竹瀝無竹葉一方有知母無梔芩當歸麥門冬飲麥冬人參茯神生地黃芩犀角甘草蓮心竹瀝湯竹瀝一升茯苓四兩麥冬防風黃芩各三兩水四升煮二升入竹瀝分三服知母丸一味為末棗肉丸服治誤服藥而虛煩不安者煩躁口渴歌口乾煩躁熱而虛結構陰陽氣不舒熱在心脾多有準煎熬津液不如初古方知母除胎渴六一黃耆主氣虛又有血凝成神醫耿隅載方書論陳良甫曰妊娠煩躁口渴者是足太陰脾經其氣通於口手少陰心經其氣通於舌若臟腑虛弱營衛不和以致陰陽失度熱乘於心脾則津液消爍故煩躁口渴也與子煩大同小異宜知母散虛熱人參黃耆散或黃耆六一湯耿隅治孕婦暴渴惟飲五味汁曰此血欲凝非疾也已而果孕古方有血欲凝而渴飲五味之症不可不知方知母散知母麥冬黃耆茯苓黃芩甘草竹瀝水二盞煎八分去渣沖竹瀝服人參黃耆散人參黃耆知母麥冬葛根茯苓秦艽甘草竹葉水煎服黃耆六一湯黃耆六錢甘草一錢水煎服子懸歌脹滿心胸病子懸紫蘇餘子古人傳自明停飲兼寒治李氏胎升相火愆下氣湯同枳殼飲瘦胎散共紫蘇煎若還衝築昏迷悶蔥白當歸可保全論子懸者胎氣不和上湊心腹脹滿疼痛也由素有寒氣致令停飲觸寒發動與氣相會故心腹脹滿也李氏曰四五月以來君相二火養胎以致胎熱氣逆湊心心腹脹滿疼痛宜嚴氏紫蘇飲加黃芩山梔子懸火盛極一時心氣悶絶而死者紫蘇飲速進救之脈有兩尺脈伏而絶者若勞役胎上脹痛水安者紫蘇飲若誤服動胎藥以致胎損者芎歸湯脈浮滑蔥白湯方紫蘇飲紫蘇當歸川芎白芍陳皮人參大腹皮洗淨甘草加姜蔥白砂仁一方有香附無人參當歸湯當歸人參阿膠甘草蔥白水煎服下氣湯蘇葉陳皮桑皮茯苓青皮白芍大腹皮甘草枳殼飲枳殼二兩黃芩白朮各一兩每服五錢水煎瘦胎飲當歸白芍枳殼砂仁香附甘草益智母草蔥白湯蔥白連須十四根濃服安生胎落死胎胎水歌胎水原來是總名土虛水泛橫流行惡寒灑淅肌浮腫喘息晞噓腹脹膨逐水鯉魚遵古法實脾白朮斂全生大都順氣調脾胃利水和中疾自平論妊娠五六月腹大異常胸腹脹滿手足面目浮腫氣逆不安此由胞中蓄水俗呼琉璃胎不治令子手足軟短有疾宜鯉魚湯或澤瀉散或苓朮湯張仲景曰妊脹有水氣身重小便不利灑淅惡寒起即頭眩葵苓散方鯉魚湯白朮生薑五兩茯苓四兩當歸白芍三兩鯉魚一尾二斤先煮魚熟取汁澄清再煎藥五服白朮散白朮茯苓澤瀉陳皮姜皮大腹皮木香為末砂仁湯下苓朮湯茯苓白朮各四兩黃芩杏仁各三兩旋覆花一兩桔紅葵苓散葵子半升炒茯苓三兩為末飲服方寸匕胎水總名也其面目浮腫者為子腫胸腹脹滿者為子滿但腳腫者為子氣也名既不同輕重自見治法亦因而已子腫歌子腫脾虛面目浮風行水泛濕停留關門不利從其類散表分消疾自瘳論脾主肌肉土氣安和則能制水水自傳化無有停積若脾胃氣虛經血壅閉則水飲不化濕氣泛溢外攻形體內注胞胎始娠腫滿兒未成實必傷胎氣若臨月而腫利小便自愈薛立齊曰子腫胸腹脹滿小便不利通身浮腫者鯉魚湯脾胃虛弱四君子湯面目浮腫肢體如水氣全生白朮散未應六君子湯若脾虛濕熱下部作腫補中益氣湯加茯苓若飲食失節嘔吐泄瀉香砂六君子湯若脾虛血少氣滯加味歸脾湯腳腫陳景初天仙藤散方白朮散白朮茯苓陳皮大腹皮桑白皮姜皮一方去白朮加木香米湯服三錢木通散木通香茹蘇葉各二錢枳殼黃芩各一錢大腹皮一錢木香訶子皮各五分生薑皮砂仁水煎服單方山梔一合炒為末米飲調下治妊娠通身浮腫子滿歌脹滿心胸氣不舒要分虛實漫躊躇風邪水搏多因實病後而成又屬虛論産寶曰妊娠經血壅閉養胎或挾水氣水血相搏致令腫滿皆由脾胃虛弱不能制水名曰子滿若水停不去浸漬入胎則令胎壞診其脈浮腹脹喘息者胎必壞也澤瀉散妊娠心靜氣和則胎自安穩若中風寒邪氣或有觸犯則隨邪生病如經血壅閉養胎忽然胸腹虛腫脹悶是胎中挾水脾主肌肉肌肉空虛水氣泛濫故令身腫然其由或因泄瀉下利虛損脾胃或因內熱煩渴引飲太過或因關門不利小便澀少濕漬脾胃皆致腫滿大抵生於五六月之間蓋胎大則腹滿而氣浮矣方澤瀉散澤瀉枳殼茯苓木通大腹皮桑白皮姜皮加砂仁水煎服防己湯桑白皮防己茯苓紫蘇木香砂仁姜水煎白朮散白朮一兩炒焦陳皮姜皮大腹皮各五錢為末米飲調二錢子氣歌子氣先從腳面浮涓涓不治恐長流全生白朮天仙散利水扶脾厥疾瘳論妊娠三月以後兩腳面漸腫行走艱難以致喘悶飲食無味似水氣狀腳趾間有黃水出謂之子氣直至分娩方消此因素有風寒濕氣及脾虛者雖不可妄投湯藥亦慮將産之際有不測之虞宜服天仙藤散以疏郁陳良甫曰妊娠兩腳浮腫名曰脆腳因脾衰不能制水水血相搏所致宜全生白朮散健脾土齊仲甫曰子氣不可作水病治反傷元氣有此者必易産因胞中水血多故也初妊者胎必壞育亦行遲痿躄名醫録曰宋少主與徐文伯微行見一妊足腫不能行少主脈之曰此女胎也文伯診之曰此男胎在左而黑少主怒欲破之文伯惻然曰臣請針之刺三陰交胎遂墜男形而黑色此足腫多男之徵也方天仙藤散天仙藤香附陳皮甘草紫蘇木瓜姜皮全生白朮散白朮一兩炒茯苓陳皮姜皮大腹皮各五錢為末米飲下二錢子癇歌忽然昏冒不知人有間蘇來發作頻此是風邪肝木病羚羊角散效如神論産寶曰風是四時八方之氣常以節氣之日候之風從其鄉來者謂之虛邪賊風逢人之虛而中之者隨其所在而病也夫五臟六腑之俞皆在於背臟腑虛者感發難治若傷太陽之經復遇寒濕相搏口噤脊強名曰風痙妊娠而發者昏冒不識人須臾則醒醒後復發名曰子癇又名子冒久則發痙宜千金羚羊角散或葛根湯加竹瀝方羚羊角散羚羊角五加皮防風當歸酸棗仁白茯神獨活甘草川芎木香姜引水煎葛根湯葛根茯苓人參澤瀉甘草防己防風當歸川芎獨活水煎臨服加竹瀝半杯薑汁兩匙子喑歌子喑言低不出聲少陰絡壅不能鳴清心降火調心腎分娩經通語自清論內經黃帝問曰人有重身九月而喑何也岐伯對曰胞之絡脈絶也帝曰何以言之岐伯曰胞絡者繫於腎少陰之脈貫腎系舌本故不能言曰治之奈何曰無治也當十月復馬玄臺曰舌云九月腎經養胎故喑似拘泥但九月之時兒體已長胞絡宮之絡脈繫於腎者阻絶不通故間有之蓋腎之脈下貫於腎上系舌本脈道阻絶則不能言至分娩後能言也博陵醫之神者曰郝翁有一妊娠喑默不能言郝曰兒大經壅故不能言兒生經通自能言矣蕭賡六曰內經大奇論以胞精不足善言為死不言為生此可驗九月而喑非胞精之不足故當十月而復也子嗽歌十二經中嗽不同火痰濕熱寒風七情六氣分虛實活法隨機可變通論肺主乎氣外合皮毛形寒飲冷傷肺則咳嗽也有涎曰嗽無痰曰咳五臟六腑俱受氣於肺各以其時感之而成病也秋則肺受之冬則腎受之春則肝受之夏則脾受之諸臟不已冬傳其腑妊娠嗽者名曰子嗽實者參蘇飲以散之虛者天門冬湯以補之若久嗽不已恐傷胎氣也薛立齊曰咳嗽秋間風邪傷肺金沸草湯夏間火邪剋金平肺散冬間寒邪傷肺人參敗毒散春間風邪傷肺參蘇飲然肺屬辛金生於已土久嗽不已多因脾虛不能生肺氣腠理不密外感風邪或因肺虛不能生水致陰火上炎治當補土生金滋腎安胎為要也方參蘇飲紫蘇陳皮桔梗前胡枳殼茯苓甘草葛根加知母砂仁天門冬湯天冬紫菀知母桑皮北味桔梗一加阿膠百合散百合紫菀麥冬桔梗桑皮甘草竹茹水煎服加蜜三匙喘息歌臟氣相乘並肺中氣爭肺溢不宣通治宜順氣兼清肺脈澀肢寒必見凶論産寶曰胎前喘息皆由榮衛之氣流行失度氣經於臟臟不能受諸氣上並於肺肺隘而氣爭故喘息也其始得之或因恚怒則精卻上焦閉而氣不行則留於肝肝乘於肺則喘出於肝也或因驚恐則心無所依神無所依氣亂於中心乘於肺此喘出於心也或因跌僕腎氣暴動傷而不通腎氣上乘於肺此喘出於腎也或飽食過度動作用力穀氣逆肺此喘出於脾也脈呂滄州治經歷哈散侍人病喘不得臥衆作肺受風邪治勿效呂診之氣口盛於人迎一倍厥陰絃動而疾兩尺俱短而離經因告之曰病得之毒藥動血以致胎死不下奔迫上衝故喘也用催生湯加芎歸服之果下一死胎而喘止方馬兜玲散馬兜玲蘇子枳殼桔梗甘草桑白皮陳皮砂仁子淋附胎壓膀胱歌小便淋漓號子淋胸煩悶亂熱乘心津虛食熱娘為病氣滯胎壅子見侵澤瀉茯苓甘竹葉木通梔子麥冬芩膀胱胎壓宜升起日久須當議補陰論腎開竅於二陰與膀胱為表裡妊娠胞系於腎腎虛熱不能利水而小便淋漓甚者心煩悶亂名曰子淋子淋散主之腎虛不能司化六味丸去丹皮加車前子萬密齊曰子淋須分二症一則妊母自病一則子為母病然妊婦自病又分二症有食辛辣咸物因生內熱者有自汗自利津液不足者子為母病亦有二症有胎氣壅熱有胎形迫塞症既不同治亦各別景曰妊娠小便難飲食如故當歸貝母苦參丸蜜丸豆大每服三丸方子淋散茯苓麥冬木通甘草大腹皮淡竹葉水煎服附胎壓膀胱六脈細弱氣血俱虛不能承載其胎墜下壓住膀胱下口因此溺不得出令穩婆以香油塗手自産門托起其胎溺出如注卻以補中益氣湯升提之或使一人對患者皆仰臥以足抵其足徐徐搖動其腿腹而胎自上心痛歌心痛多端仔細占風寒痰熱總相兼火龍散共砂仁散痛甚延胡及手拈論大全曰妊娠心痛乃氣邪痰飲交結若傷心正經為真心痛則爪甲青旦發夕死夕發旦死若傷支絡則乍安乍作名厥心痛若傷於子臟則胎動而下血妊娠心痛非止一端當審脈症而治之方火龍散川楝子茴香各三錢艾葉一錢五分鹽水炒水煎服手拈散延胡索五靈脂草果乳香沒藥末服一錢胸腹痛歌上下攻衝胸腹疼陰陽邪正互相爭當歸芍藥原方治香附砂仁亦有能論胸腹痛者或宿有冷痛或新觸風寒皆由臟虛而致也邪正相搏而並於氣隨氣上下上衝於胸則胸痛下攻於腹則腹痛也張仲景曰婦人懷娠腹中疼痛當歸芍藥散方當歸芍藥散當歸三兩白芍一斤茯苓四兩白朮四兩澤瀉八兩川芎三兩末服一錢縮砂飲砂仁炒為末酒調二錢覺腹中熱胎即安腰痛歌妊婦胞胎系腎經一毫觸犯不安寧青蛾通氣調肝腎還恐胎元不久停論何松庵曰腰痛脈大而痛不已者腎虛也青蛾丸脈澀而日輕夜重者氣血凝滯也縮砂飲脈浮者為風邪所乘大豆紫湯脈實者閃挫也通氣散總以安胎為主方通氣散補骨脂炒為末嚼胡桃以酒服三錢青娥不老丸杜仲一斤姜炒補骨脂四兩鹽酒炒桃肉十枚蜜丸服鹿角散鹿角長六寸燒赤淬酒中又燒又淬取酒服妊娠傷寒歌妊娠傷寒先保胎六經表裡次安排若然不解生傳變自有專科莫亂猜論妊娠傷寒專以散風清熱安胎為主如發表香蘇飲半表半裡黃龍湯清火黃連解毒湯余詳傷寒本科方香蘇飲香附蘇葉陳皮甘草砂仁姜水煎服如太陽經加羌活防風陽明經加葛根知母少陽加柴胡黃連解毒湯黃連黃芩山梔黃柏水煎黃龍湯柴胡黃芩人參甘草實熱去參加砂桔妊瘧歌乍寒乍熱名為瘧榮衛陰陽氣不和汗少汗多行補散若然和解用柴胡論瘧者寒熱交爭皆因於風寒也風為陽邪化氣而為熱寒為陰邪化氣而為寒陰陽交爭寒熱更作或陰並於陽則陰實陽虛而惡寒若陽並於陰則陽實陰虛而發熱先傷於寒後傷於風則先寒後熱先傷於風后傷於寒則先熱後寒初瘧無汗者散之久瘧多汗者補之方小柴胡湯柴胡黃芩人參甘草加茯苓知母陳皮生薑瀉痢歌水穀不化屬脾虛臭穢稠黏作熱醫清熱厚腸兼理氣和中理氣更扶脾論泄瀉者痛腹腸鳴水穀不化或喜歡嘔逆協熱下利並宜四苓散黃芩白芍湯若裡急後重下痢赤白稠黏臭穢謂之滯下宜香連丸能食者輕絶不食者死壺公曰有妊娠病痢不止脈虛而滑兩關脈澀此胎氣不和相火上炎似痢非痢也用安胎藥而愈方香連丸川連五錢吳茱萸同炒揀去吳茱萸不用木香一錢神麯糊丸米飲服一錢胎動不安歌妊娠胎動有多端內熱房勞或著寒舉重食傷皆致病憂思恚怒總相干保全散共安胎飲佛手湯同膠艾丸只恐胎傷因下墜離經脈見保嬰難論胎動不安有因酒色過度者有舉重觸犯者有誤食毒物者有勞役太過者有喜怒不常傷於心肝觸動血脈者有信服熱藥反為藥害者有血少不能養胎者有胎元內熱者大法因母病而胎動者但治母其胎自安若胎熱血少不堅固者但安胎母疾自愈胎動不安者欲知男女生死之法令人摸之如覆杯者男也如肘頭參差起者女也溫者為生冷者為死方保全散當歸一兩五錢阿膠五錢甘草三錢加連須蔥白三莖水煎縮砂飲縮砂仁炒熟去衣為末酒調服二錢或艾湯調下服此覺胎動處熱是藥力到也佛手散當歸川芎各一兩水煎頓服生胎自安死胎自下也妊娠吐血歌怒氣傷肝血上衝勞傷風熱不相同須知實火宜清理虛火滋陰可奏功論妊娠吐血者皆由臟腑有傷而致也或用心太過或思慮傷脾或怒氣傷肝氣逆於上血隨而溢心悶胸滿久而不已多致墜胎若心悶甚者不治薛立齊曰血症若肝火妄動先用小柴胡去半夏加山梔生地次用四物加黑山梔或加味逍遙散去丹皮若肝經風熱防風子芩丸心經有熱硃砂安神丸心氣不足補心湯思慮傷心者妙香散胃經有火犀角地黃湯膏粱積熱加味清胃散鬱結傷脾加味歸脾湯肺經有火黃芩清肺飲氣虛不能攝血補中益氣湯腎經虛火地黃丸但看虛實分治實火可瀉法當清熱以養血虛火可補法當滋陰以補水則當自安若執尋常治血之法而用行血消血之藥則胎自墜矣胎漏下血激經胞阻濕胞歌下血腹痛名胞阻膠艾芎歸最有靈非時卒下為胞漏月事依期號激經尿血溺時常有血漏胞血去不曾停更有肝風榮實症防風丸服與黃芩論胎漏者由衝任脈虛不能約制手太陽少陰之經血也懷妊之人經水不行者壅之以養胎蓄之以為乳也若衝任氣虛則胞內泄不能制其經血故月水時下亦名胞漏血則盡人斃矣此虛症也張仲景曰婦人宿有症病經斷未及三月而得漏下不止胎動在臍上者為症痼害妊娠六月動者前三月經水利時胎也下血者後斷三月胚也所以血不止者其症不去故也此宿病也婁全善曰妊娠經來不多飲食精神如故六脈和緩滑大無病者血盛有餘也兒大能飲自不來矣此緩症也百問曰胎息未實勞力觸犯或食毒物或房勞驚恐致令子宮虛滑經血淋瀝敗血湊心子母難保此急症也産集曰肝經有風榮經既為風所勝則所下者非養胎之血作漏胎治則誤宜防風黃芩丸此實症也金匱要略曰妊娠下血腹中痛者為胞疽芎歸膠艾湯千金方曰妊娠下血不止名曰漏胞胞干便死宜用生地黃八兩以清酒三升煮減半絞去滓服脈經曰婦人經水下但為微少師脈之反言有軀其後審然其脈何類何以別之師曰寸口脈陰陽俱平榮衛調和按之滑浮之則清陽明少陰各如經法身反灑淅不欲食飲頭痛心亂嘔噦欲吐呼則微數吸則不驚陽多氣溢陰滑血盛滑則多實立經養成所以月見陰見陽精汁凝胞散散者損墜設復陽盛雙妊二胎今陽不足故令激經也曾有妊娠月信不斷而胎不損産科熊宗古曰婦人血盛氣衰其體必肥是以月信來而胎不損若作漏胎治則胎必墜若不作漏胎治則胎未必墜誠有旨也方膠艾四物湯當歸川芎生地白芍阿膠艾葉防風黃芩丸防風一兩黃芩醋炙黑兩末之酒糊丸米飲下三錢止漏散乾生地四兩炮姜灰二兩為末空心米湯調服二錢服備金散香附醋炒黑當歸五靈脂炒黑為末米湯調服二錢加炒黑荊芥醋炒地榆尤妙胎上逼歌將養失宜胎上逼若然氣促必傾危當歸蔥白阿膠草大腹砂仁功亦奇論將養合宜氣血調和則胎得其所而産亦順否則胎氣動逆上逼心肺以致氣塞不轉悶亂喘促而死矣薛立齊曰氣逆胎上紫蘇飲若飲食不甘兼六君子肝火內熱加味逍遙散胃火四君加梔芩脾郁加味歸脾方當歸湯當歸人參阿膠甘草連須蔥白水煎服或單用蔥白二十一莖水煎服未死即安已死即下胎不長歌氣血兩虛胎不長黃耆白朮共當歸鯉魚煮汁頻頻服久久功成胎自肥論聖濟總録曰調理失宜飲食減少氣血虛弱不能行榮衛化精微養衝任故令胎內弱子氣不足若使脾胃和而能飲食水穀化而運氣血何慮胎氣之不長也方黃耆湯黃耆白朮茯苓麥冬人參陳皮甘草姜棗白朮丸白朮當歸阿膠地黃川芎牡蠣川椒蜜丸服三十丸集驗方鯉魚長尺許煮如食法飲其汁則胎自長矣腹內鐘鳴兒在腹中哭附乳法歌妊娠腹內似鐘鳴或有嬰兒哭泣聲鼠窟黃連雖主治要知育後不長生論妊娠腹內鐘鳴用鼠窟中土為末入麝香少許酒調服二錢立愈或以黃連濃煎汁令母時常呷之産寶曰腹中兒哭者是臍帶上疙瘩兒含口中因妊娠登高舉臂脫出兒口因此作聲令妊婦曲腰就地如拾物狀仍入兒口即止又曰其治法亦用前二方薛立齊曰黃連性寒麝香開竅當酌量用之一婦懷娠八月因舉手掛窗遂致兒在腹中哭衆莫能治一老穩婆教以大豆一升撒地令孕婦拾之果未及一半而愈妊娠無故忽然兩乳中滴出者謂之乳有此症者兒多不育防胎自墜歌三月七月數應奇肝一心三五屬脾七肺九腎皆在臟傷胃中衝恐墜之十月養胎遵古法千金保孕獨稱奇更宜愛護調神氣免使胎元不及期論大金曰陽施陰化榮衛調和經脈完固十月而産若氣血虛損不能養胎則墜也凡腰痛者多有墜胎之患王海藏曰墜胎之因有五總由氣血虛弱不能榮養胎元或七情太甚內火發動火能消物而墜或遇傷勞役飢飽動胎而墜或遇於房事觸犯其胎而墜或跌僕閃挫傷動其胎而墜或大怒悲哀傷動心肝之血而墜然而小産甚於大産由於胎臟損壞胞系腐爛故也巢元方曰受胎在腹七日一變墜胎在三五七月多二四六月少臟陰而腑陽三月屬心五月屬脾七月屬肺皆屬五臟陰常易虧故多墜耳一月屬肝怒則多墜洗下體竅開亦墜一次既墜肝脈受傷下次亦墜今之無子者大半是一月墜胎非盡不受孕也泰山磐石丸人參黃耆白朮當歸川芎白芍甘草熟地續斷黃芩砂仁糯米為丸服雙胎一死一生歌跌僕雙胎一死生器中投鼠實難行千金蟹爪膠甘桂方出真人價不輕論陽施陰化精血有餘則成雙胎若冷熱失宜氣血虧損則胎萎而不育或過期而不産若雙胎脈弱經養不周故偏傷也候其胎上冷是胎已死如抱雞子熱者為生冷者多濁物理之自然者也孫真人曰妊娠僵仆失據胎動轉上搶心甚者血從口出逆不得息或注下血一斗五升胎不出子死腹中急如産狀虛乏少氣困頓欲死者方蟹爪散蟹爪一升阿膠二兩炒甘草二尺桂半尺東流水一斗煮蟹爪甘草取三升去滓內阿膠煬盡能為一服佳不能者食頃再服若口噤不能飲者格口灌之藥下便活與母俱生若胎一死一生則死者自下而生者自安若胎已死獨母活也煎藥宜用向東灶以茅葦薪火煎之誤服毒藥歌誤服湯丸胎氣傷攻衝腹痛實倣徨先煎甘豆湯頻服知母芎歸亦可嘗論立齊曰妊娠誤服毒藥胎動不安者甘草黑豆淡竹葉水濃煎服以解之若頓僕用阿膠散送知母丸若下血腹痛佛手散子母丸去血過多八珍湯加益母方阿膠散生地當歸白芍阿膠黃耆艾葉甘草砂仁知母丸知母焙為末棗肉丸如彈子大每服化下一丸白扁豆散扁豆生為末每服三錢米飲調下孤漿歌娠妊水下曰孤漿脾弱元虛氣血傷糯米黃耆湯早服免教子母兩分張論脈經曰婦人懷軀六七月暴下鬥余水其胎必依而墜此非時孤漿預下氣血皆虛故也大金曰妊娠忽下黃汁如膠或如豆汁胎動腹痛者宜黃耆糯米湯黃耆六兩炒糯米五合一方有川芎水七升煮三升分四服日三夜一鬼胎歌聞說鬼胎如抱甕面青脈澀腹如冰雄黃斬鬼班玄散先哲傳留暗室燈論人之臟腑調和氣血充實則風邪鬼魅不能幹之若榮衛虛損精神衰弱妖魅魍魎得入臟腑狀如懷子名曰鬼胎虞天民曰鬼胎屬思想所致蓋晝之所思即夜之所見凡男女之性淫而虛者肝腎相火無時不起故勞怯人多夢與鬼交故鬼者為胎也非實有鬼神交接成胎也故曰思想無窮所願不遂發為白淫白濁流於子宮結為鬼胎本婦自己血液淫精結聚成塊耳方雄黃丸雄黃鬼白莽草硃砂巴豆去油各五錢獺肝炙黃八錢蜥蜴炙蜈蚣各一條炙為末煉蜜丸如梧桐子大每服三丸空心溫酒下頃下如蛇蟲乃愈斬鬼丹吳茱萸川芎秦艽柴胡芫花醋炙巴戟巴豆霜姜蠶蜜丸酒下七丸出惡物愈班玄丸斑蝥炒玄胡索各三錢末服五分酒下酒糊丸服亦可小産歌婦人小産可寒心或用芎歸或用參去血過多宜大補停痰昏悶服烏金論産寶曰凡驢馬有孕牡者近身則蹄之名曰護胎所以絶無小産之患人之胎系胞中氣血養之靜則神藏躁則消亡欲火一動則精神走泄火擾於中則胎墜矣齊仲甫曰小産有下血不止血凝不出二症蓋血得寒則凝得熱則行若墜胎損經其血不止必煩悶而死或因風冷墜胎血冷相搏氣虛血逆甚則血結不出搶上攻心悶絶而死當溫經逐寒其血自行若血淋瀝不止是衝任氣虛不能約束宜膠艾湯大抵腹痛者為實按之更痛手不可近者宜逐瘀生新芎歸湯失笑散之類是也不腹痛者為虛按之痛減者亦為虛宜用溫補四神湯炮薑肉桂之類方烏金散好墨二兩燒赤醋淬七次又燒赤放冷研沒藥血竭各五錢麝一分為末每服溫酒調一錢如血迷童便調服二錢立醒當歸散當歸一兩五錢阿膠三兩艾葉一兩川芎一兩每用四錢水煎入薑汁一匙生地汁五合煎五六沸溫服異産歌風雷晦冥合陰陽惡氣乘胎産異常更有異中還異者相期博學漫推詳論李時珍曰胎十月而生常理也而有七月八月生者十二三月生者十四五月生者或云氣虛也醫學正傳言有十七八月至二十四五月生者劉敬叔異死言太源溫盤古孕三年乃生豈亦氣虛耶今孕七月生者多育八月生者多夭是七變而八不變也晉書符堅母孕十三月而生漢書堯及昭帝皆孕十四月生劉聰母孕十五月而生搜神記云黃帝孕二十五月而生皆常中之異者也胞門子臟為奇恆之府所以為生人之戶常理也而有自脅産自額産自背産自髀産者何也豈子臟受氣駁離而其繫有不同如宋史所記男陰生於脊女陰生於頭之類耶史記云陸終氏娶鬼方之女孕而左脅出三人右脅出三人如修已背坼而生禹簡狄胸坼而生契也魏黃初六年孔羡表言汝南屈壅妻王氏生男從右脅下小腹上出子母全安異死曰晉時李宣妻樊氏義熙中懷孕不生而額上有瘡兒從瘡出又趙宣母妊股髀作癢搔之成瘡兒從瘡出嵩山記陽翟有婦人妊三十月兒從母背出五歲便入山學道去琅琊鈔云成化中宿州婦孕脅腫如癰及期兒從癰出瘡痏隨合其子名佛記兒隆慶五年二月唐山縣民婦有孕左脅腫起兒脅生子母俱無恙此皆産理異中之異者也女子二七天癸至任脈通故有子七七天癸絶無子常理也乃有十二歲而生子者如褚記室所載平江蘇達卿之女類是也有婦人五十六十而生子者如遼史所載亟普妻年六十生二男一女此則異中之常者也玄珠密語曰人生三子主太平人生三女主淫失政人生十子諸侯競位人生肉塊天下饑荒此就人事而論氣化所感別有所關也如西樵野記載嘉靖己酉橫涇傭農孔方忽患膨脹憒憒幾數月自脅産一肉塊剖視之一兒肢體毛髮悉具也又有人生於卵生於馬之類徐偃王之母産卵棄之孤獨老母取伏之出一兒漢末有馬生人名曰馬異此皆造化無窮之變異也
