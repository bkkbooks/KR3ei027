body:
  text: 卷之一調經門女科指掌賦嘗聞天地定位陰陽運消長之機家室和平男女具生成之用禮稱內則詩首關雎書垂釐降之文易尚乾坤之義春秋鄭重夫王姬胎教肇始於太任亙古迄今其來尚矣蓋洪濛未判以前萬物皆太極渾淪於一元之內清寧既奠之後無物不託基於陰陽二氣之中五行雖發水火不衰四體未全精靈已具乾道生男坤道生女二氣相感合而成人雖曰兩精之相搏實乃一理之周通假如明月云淨天之喜也佳期生掌上之珠迅雷疾風天之怒也配合召腹中之怪人但講有生之四柱而鮮知未生之八字也故曰天地絪縕萬物化醇男女構精萬物化生化生者塞化醇者頤覆土之陵積水之澤草木魚蟲孰形孰色無極之真二五之精妙合而凝化化生莫測其神莫知其能理之所始數之所起微乎微乎其小無形昭乎昭乎其大無垠上而日月星辰下而水火土石大而綱常名教細而飲食居處顯而春夏秋冬微而權衡律呂近而身心性命遠而飛走動植萬象雖殊一理而已若夫醫學之傳首自黃農女科之始則由扁鵲邯鄲為帶下之醫史遷所載産寶著愈風之散華他所傳病機不等巢元方之立論最詳精血攸關褚待中之遺書甚善熱入血室臟燥悲傷胃氣下泄而陰吹非張長孰能辨此三十六病轉女為男巧奪造化之樞機舍孫真人其誰與歸唐白敏中訪咎殷備集驗方三百七十八首而為産寶宋郭稽中稱濮陽李師聖産論二十一篇以為産方作大全陳自明之勳最補醫按薛立齋之功多高實刻便産須知杜荍著産育寶慶朱丹溪之百問可傳陳無擇之三因宜讀搜羅衆善王宇泰之女科準繩分晰群方武叔卿之濟陰綱目議論具備於經綸方法謹承乎家祕東垣河間各有名言春甫養葵亦多妙義夫如是則方書甚晰何俟煩言道理淵微惡容輕述蓋以經綸雖善有論而無方産寶相因太簡而不備廣博者皓首窮經難於誦讀約略者空拳對症苦缺施為是以不揣愚陋妄撰數語非敢問世聊付及門學問思辨不辭人十而已千補瀉寒溫可即一隅而反四便於誦習或取茲編若要博通難忘原本須溯流而窮源勿捨本而逐末正心誠意可感天地而通神明格物致知方徹顯微而推臟腑無大過無不及機權在我勿矜能勿貪得施報由人惟期行滿於三千青城可望更惜功虧於二六白首無成最易誤人不盡風塵之碌碌曷勝長嘆無邊世事之悠悠至如臨症先識提綱若要詳明須通經絡臟病腑病有陰陽氣血之殊內因外因分表裡虛實之異脈宗內難更究諸家藥照本經宜窮綱目邪之所湊其氣必虛審有餘不足之形勢必先歲氣無伐天和推太過不及之流行居經者三月而一至脫榮者始富而終貧若要調經先須去病如雲求子務積陰功健脾養血胎前可用清涼逐瘀生新産後宜行溫補産家三病非仲景未易明言安産全圖雖準繩何曾備載帶下主於風冷至丹溪而濕熱始明崩中久則元虛賴東垣而升提有法經行異色虛者淡而熱者紫月候愆期枯則補而澀則通澀少過多宜辨趕前落後須分茯苓補心湯治虛勞而療咳嗽金鎖正月丹安心腎而醫白淫處女初經腹痛不寧氣喘促心神恍惚師尼不月往來寒熱內潛消相火奔騰柏子丸生地丸清心而退熱交加散調經散止痛以祛寒赤帶須尋龍骨散白崩應服馬蹄丸歸脾湯治血脫血虛心脾有損威喜丸療白淫白濁水火不交失笑烏賊止失血心痛茯苓鹿角截夢與鬼交腹痛有寒熱氣血之不侔身熱分虛實客潮之各異吐嘔不同嘔者頻而吐者頓漏崩莫混崩則急而漏則徐琥珀丸利水聖藥破棺丹隔氣神方臟燥悲傷仲景原傳甘麥飲傳尸勞瘵仙翁留下獺肝丸北斗符祛邪有驗養榮湯補正最宜白芷散樗根丸兼除崩帶烏雞丸鱉甲散專補虛羸龍膽瀉肝湯主下部濕熱之病嚴氏抑氣飲治上焦鬱結不舒經閉有血滯血枯腫脹有血分水分千金桃仁散去癥瘕而破血四制香附丸開鬱氣以調經五積散外邪第一四神湯虛熱無雙抑又聞不孝有三無後為大精血乃化育之源常須珍重情欲是伐生之斧慎勿貪嗔佳期須絪縕之時配合求先天之氣駢胎品胎由精血之旺藥忌食忌戒口腹之愆徐之才論逐月養胎之方孫真人有轉女成男之術胎前衆疾安胎飲加減咸宜保孕諸方內補丸昔稱穩當心痛腹痛兮乃氣滯而經壅子腫子滿兮由土虛而水泛喘急者防孕氣上衝腰痛者恐胎亢下墜達生散束胎散滑胎有效芎歸湯獨參湯臨産如神交骨不開龜板發灰同佛手胞衣不下木通牛膝共芎歸致於産畢氣血大虛飲食起居更宜謹慎梳頭刷齒恐血逆而致頭風食麵吞鮮慮咳嗽而生泄瀉入房太早致死虛羸生冷不除必生腫脹回生丹治産後百病失笑散主胸腹諸疼表虛自汗容易中風愈風紫豆最宜胃弱化遲不難停食楂桔香附悉效血虛發熱大忌寒涼腹痛惡寒必需薑桂惡露不盡則潮熱而便難量行桃核新血未生必口乾而煩渴戒食生梨初産悶絶必是停瘀蘇木紅花蕊石淹留日久則成內熱當歸羊肉澤蘭若要除根月經再至如逢逆症切勿糊塗瘀血入肺面黑喘急而難治孤陽欲脫自汗氣促而必危經傷則心痛而死胃絶則吐沫而亡三沖三急死生在反掌之間五實五虛在秋毫之際嗟嗟天命不齊人謀亦異幸則子母雙全不幸則身家兩失一念之差千古遺憾同志之士蓋可忽乎哉婦人三十六病歌三十六疾為何生七害相同十二症九痛五傷良有説更兼三痼得其名白膏黑紫赤如膿豆汁葵羹凝血壅清血水來如米清愆期月浣是症宗九痛陰疼或淋瀝溺時寒冷或臨經汁流氣滿如蟲齧腸下腰胯痛不寧七害孔痛中寒熱小腹堅痛臟不仁子門不端引背痛愆期害吐得其真五傷兩脅支滿痛心痛鬱結氣不通邪思泄利精神少前後陰陽亦在中三痼虛羸似鶴形從來絶産不添丁更兼不月胞門閉莫道醫方用不靈食氣冷勞房妊睡亦名七害出準繩據云産寶言如此虛虎相傳或誤謄論經曰女子七歲腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下天者天真之氣癸者壬癸之水但壬為陽水配丁而化木癸為陰水配戌而化火女子陰類故得癸焉沖為血海任主胞胎二脈流通經血漸盈應時而下天真氣降故曰天癸常以三旬一見象月盈虧不失其期又名月信也若遇經行最宜謹慎倘被驚恐勞役恚怒風冷則氣血錯亂經脈不行多致肢體痠痛頭目眩暈咳嘔不寧淋瀝無已漸成勞瘵不治者有矣犯時微若秋毫成病重如山嶽可不畏哉張景嶽曰婦人之病因虛積冷結氣為患經水斷絶至有歷年血寒積結胞門寒傷經絡凝結在上嘔吐涎沫久成肺癰形體損分在中盤結繞臍寒疝兩脅疼痛與臟相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非止女身在下來多經候不勻令陰掣痛少腹惡寒或引腰脊下根氣街氣衝急痛膝脛痠痛奄忽弦冒狀如厥巔或有憂慘悲傷多嗔此皆帶下非鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辨記孫真人曰三十六疾者謂十二症九痛七害五傷三痼是也十二症是所下之物一曰狀如膏二曰如黑血三曰如紫汁四曰如赤肉五曰如濃痂六曰如豆汁七曰如葵羹八曰如凝血九曰如清血血似水十曰如米泔十一曰如月浣乍前乍卻十二曰經度不應期也九痛者一曰陰中痛傷二曰陰中淋漓痛三曰小便即痛四曰寒冷痛五曰經來腹痛六曰氣滿痛七曰汁出陰中如蟲齧痛八曰脅下分痛九曰腰胯痛七害者一曰窮孔痛不利二曰中寒熱痛三曰小腹急堅痛四曰臟不仁五曰子門不端引背痛六曰月浣乍多乍少七曰害吐五傷者一曰兩脅支滿痛二曰心痛引脅三曰氣結不通四曰邪思泄利五曰前後痛冷三痼者一曰羸瘦不生肌肉二曰絶産乳三曰經水閉塞竅小不通脈寸口脈微而澀微則衛氣不足澀則榮血無餘衛不足其息短榮不足其形燥榮衛俱虛言語乏力跌陽脈微而澀為虛虛則短氣咽燥口苦澀則津液少少陰脈微遲而澀微則無積遲則陰中寒澀則血不流而經閉此為居經三月一來脈虛氣血俱虛年少者亡血也脈微弱而澀年少得此為無子中年得此為絶産六脈沉弦細數者其病已成元氣榮衛俱虛形衰神怯者雖藥勿效孫真人曰婦人腹中十二疾經水不時經如清水經水不通不周時生不乳絶無子陰陽減少瘕痛如刺陰中冷子門引背痛經水凍如葵汁腰急痛凡此十二病皆因經行內虛時或冷水洗浴或坐臥濕地或當風取涼或誤食生冷或瘡痍未瘥便合陰陽或早起作勞衣單席薄寒從外入也方赤石脂丸赤石脂煅另研二兩半夏炮薑當歸防風丹參各一兩吳茱萸鹽湯泡炒蜀椒桂心萑蘆各五錢白蘞一兩為末煉蜜丸空心酒下十丸日三服不知稍加丸數以知為度千金白堊丸白堊龍骨芍藥黃連當歸茯苓黃芩白蘞瞿麥石葦細辛牡蠣藁本甘草甘皮附子大黃人參白石脂禹餘糧烏賊骨蜜丸餘下二十丸十二症倍牡蠣龍骨禹糧石脂烏賊骨九痛倍黃連白蘞當歸甘草七害倍細辛藁本甘皮加蜀椒吳萸五傷倍大黃石葦瞿麥三痼倍人參加巴戟石脂帶下歌婦人帶下有多般風冷驚痰濕熱寒五臟三焦俱病此七情六欲總相干木乘土位因虛入積滯胞門作實看損耗精神形體瘦重亡津液腎源干臨經房事傷衝任恚怒悲衰動肺肝升舉補中益氣飲澀敗樗白固真元莫言久病醫無效識得樞機治不難攻補寒溫隨症用不須九轉鍊金丹論素問曰任脈為病男子內結七疝女子帶下瘕聚又曰脾傳之腎名曰疝瘕小腸冤結而痛出白名曰白蟲出白溲又曰小腹冤熱溲出白液又曰思想無窮所願不得意淫於外入房太甚發為白淫仲景曰婦人年五十病下利暮即發熱腹滿小腹裡急手掌煩熱唇口乾燥此屬帶下曾經半産瘀血在小腹不去故唇口乾燥也溫經湯帶下經水不利小腹滿痛一月再見者土瓜根散婦人陷經漏下黑不解膠薑湯一作膠艾湯婦人小腹滿如敦狀小便微難而不渴生後者此為水與血結在血室也大黃甘遂湯婦人經水不利下抵當湯經閉不利藏堅癖不止中有乾血下白物礬石圓六十二種風腹中血氣刺痛紅藍花酒婦人腹中痛當歸芍藥散小建中湯良方曰帶下有五由經行産後風邪乘虛入內傳於臟腑而致之傷肝膽色如青泥傷脾胃黃如爛瓜傷心小腸色如赤津傷肺大腸形如白涕傷腎膀胱黑如衃血人有帶脈橫於腰間如束帶之狀因名曰帶故難經曰帶脈者起於季脅回身一周帶脈為病腹滿腰溶溶若坐水中産寶曰處女三病一者經水初下陰中熱或當風臥怖三者有一後必帶下神仙聚寶散河間曰帶下由任脈濕熱甚津液溢而為帶也如火鍊金熱極反兼火化六月熱極則萬物反出津而潤澤宜苦寒正治之有用辛溫從治而愈者辛能發散故也丹溪曰赤屬血白屬氣俱是胃中濕痰積痰流而下滲入膀胱宜用升提星半蒼朮海石黃柏青黛樗根皮之類家祕曰大腸主津小腸主液清氣上升濁氣下降則津液化為氣血而填骨髓養五臟充肌膚何疾之有其或七情內傷六淫外感陰陽乘戾清濁不分逆於經遂流於衝任津液不能四布何以奉心化赤而為血哉故帶下也宜補中益氣湯送青黛牡蠣雞子清丸脈右手寸平尺浮浮為陽陽絶者無子若足冷帶下輕則漏下重則崩中皆心不榮血肝不藏血所致帶下六極之病脈浮則腸鳴腹滿緊則腹中痛數則陰中生瘡弦則掣痛尺寸俱虛者漏血帶下帶下漏血脈浮惡寒者不治風經行衝任已虛空登廁乘涼易中風浮緩頭痛流鼻涕急尋蒼柏與辛芎蒼柏辛芎散涼多悲不樂足如冰腰腹時疼嘔帶崩六脈沉遲或虛火按之無力是寒徵酒煮當歸丸驚血去心虛易著驚精神恍惚不和平木乘土位脾家弱脈動虛浮帶已明歸脾湯痰脈滑肌肥氣不清濕痰下注帶如頃頭眩嘔噦兼麻木多是痰涎裡面生樗皮丸重者小胃丹主之濕脈緩肌黃腳面浮腰胯沉重帶長流或時泄瀉偏難溺嗜臥腸鳴濕上求四神丸雙白丸香附散熱陽盛陰虛火易升煎熬津液喪元精形衰脈數皮膚燥口苦咽乾耳內鳴三黃三白丸白朮丸寒寒脈沉遲比冷輕惡寒腹痛食難行或時吐利吞酸水足冷腰疼色不榮大溫經丸虛漏下多時內必虛急宜補益莫躊躇脈來細小芤微澀烏骨雞丸載古書烏骨雞丸實敗精濁血滯胞門氣積痰凝作實論腹內堅疼脈弦實石瘕痃癖及賁豚晞露丸漏帶帶下如同經水來半年三月一當災健脾補氣兼收澀不禁安能得受胎白馬蹄丸樗皮丸附方地榆膏治赤白帶骨立者針灸三陰交穴在內踝上三寸天樞在臍旁二寸氣海在臍下一寸半血海二穴在膝臏上內廉中樞在臍下四寸豐隆在外踝上八寸水道在天巨下三寸白濁白淫歌不甚黏稠比帶輕白淫白濁白崩名真元下陷脾虛損龍火蟠騰水不升多欲房勞明伐腎邪思妄想暗傷情要知經絡根源病察脈觀形辨五行論吳梅坡曰婦人下赤白不甚稠者名白淫與男子白濁同由於龍雷之擾而不澄清也屬足少陰太陰治當清補若有滑白稠黏者名帶下屬心包手厥陰心包繫於脊絡於帶脈通於任脈治宜血肉之劑以培之此探本窮源之論也時人泥於常套作濕痰治用兜澀升提之類豈知本原傷損以致腐敗而來彼澀滯不清之物則益加其滯升提不正之氣則愈增其鬱惟宜六龍固本丸十六味保元湯脈陽急為瘕陰急為疝浮則腸鳴緊則腹痛數則生瘡弦則筋掣弦大虛芤細小微澀皆主下白心腎不交深闔寂寞暗傷春腳軟腰疫氣不勻白滑下流多惡夢耳鳴目眩少精神金鎖正元丹思慮傷神胸痞虛浮面色黃多眠少食困狼當陰陽清濁相干混若欲分清四七湯怒氣傷肝往來寒熱不安寧脅痛心煩面帶青口苦脈弦小便數便知鬱怒在肝經加味逍遙丸固本調元頭暈心嘈氣血虧四肢乏力屬於脾時常麻木精神少固本培元最合宜六龍固本元經候總論歌婦人二七天癸至衝任始通匝月行恚怒憂思宜謹慎陰陽氣血自和平雖由心統經遂液還賴脾資水穀精行後空虛勞即病初來恍惚易生驚猛然撫髀長虛嘆偶爾停針不作聲便是桃夭思諷詠應知雎鳥欲和鳴脈弦出際三關透情動於中百感生舊血停留還滲入骨蒸潮熱症非輕乘涼登廁風吹入飲冷形寒血不營若要調經先去病更推形色得其情過期色淡知無血帶紫趕前熱不清未至先疼因氣滯行過腹痛自虛明平時發熱因勞積熱在臨經血不盈氣亂錯經行口鼻脾虛漏下若葵羹去多不住宜滋養來少無疼大補榮經閉要分虛實看血枯氣隔熱痰名論經曰天地溫和則經水安靜天寒地凍則經水凝泣天暑地熱則經水沸溢卒風暴起則經水波湧而隴起任脈通衝脈盛男則運行女則停止運行者無積而不滿動也停止者有積而能滿靜也不滿者陽氣隨時而行運滿者陰血以時而下溢謂之信者男子以氣運故陽氣應日而一舉女子以血滿故陰血應月而一下褚侍中曰男子精未通而御女以通其精則五體有不滿之處異日有難狀之疾陰已痿而思色以降其精則精不出而內敗小便道澀而為淋精已耗而復竭之則大小便道牽痛愈痛則愈便愈便則愈痛也女人天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而為腫後雖合而難子又曰合多則瀝枯虛人産衆則血枯殺人觀其精血思過半矣寡婦師尼異治褚澄療尼姑寡婦別制方法蓋有謂也此二種獨陰無陽欲心萌而不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為勞嘗讀史記倉公傳載濟北王侍人韓女病腰背痛寒熱衆醫皆以為寒熱病倉公曰病得之欲男子而不得也何以知之診其脈肝脈弦出寸口是以知之蓋男子以精為主女人以血為主男子精盛則思室女子血盛則懷胎也夫肝藏血者也厥陰肝脈弦出寸口上魚際則陰盛可知矣大法宜本事方生地黃丸柏子仁丸衛生湯調經先去病月水循環百病不生而有子若六淫外感七情內傷氣血不調心腹作痛或引腰背上下攻利吐逆不食或寒熱癥瘕或潮熱腹痛重則咳嗽汗嘔泄瀉蓋潮熱自汗則血液消耗咳嗽嘔吐則氣往上行瀉則津泄於下痛則積結於中是以必先去病爾後可滋血調經若血滲入骨便為骨蒸血積於中相搏則痛血枯不能滋潤百骸則熱蒸於外血枯包絡火旺或挾外邪變成勞瘵調經大法婦人經病有月候不調者有經水不通者然不調不通之中有兼疼痛者有兼發熱者此又分為四也四者細推之不調之中有趕前者有退後者趕前為熱退後為虛也不通之中有血滯者有血枯者血滯宜破血枯宜補也疼痛之中有常時作痛有臨經作痛常時痛為氣滯臨經痛為血病也發熱之中有常時發熱有經行發熱常時發熱為血虛有積臨經熱為血虛有熱也此又分而為八也大抵內因憂思忿怒外則形寒飲冷氣血鬱結不行此不調不通疼痛發熱之由也氣行血行氣止血止故治血病以行氣為先香附之類是也熱則流通寒則凝結故治血病以熱為佐薑桂是也經水異色丹溪曰經水者陰血也陰必從陽故其色紅稟火象也血為氣之配氣熱則熱氣寒則寒升降清濁因氣而行故成塊者氣之凝也將行而痛者氣之滯也行後痛者氣血虛也錯經妄行者氣之亂也色淡者虛而有水混之也紫者氣之熱也黑者熱甚也今人見紫黑成塊作痛指為風冷乘之用溫熱藥禍不旋踵經曰亢則害承乃制熱甚必兼水化所以熱則紫黑也四物加黃連香附淡白者氣虛也芎歸參耆芍附多而色淡者痰也二陳芎歸如煙塵屋漏水者濕也二陳湯加秦艽防風二術成塊作片白不變者氣滯也四物枳殼香附延胡索陳皮居經月水一月一來乃其常也有三月一來者謂之居經氣血不足故也又有一年一來者又有石女無經者亦有頻年不來一來即孕者皆其變也亦如脈之有反關耳脈脈微氣血俱虛年少者亡血也乳子下利則可否者此為居經三月一來少陰脈微而遲微則無精遲則陰中寒澀則血不來此為居經三月一來寸口脈衛浮而大榮反而弱浮大則氣強反弱則血少孤陽獨呼陰不能吸二氣不停衛降榮竭陰為積寒陽為積熱陰虛陽實故令少血時發灑淅咽燥汗出或溲稠數多唾涎沫此今重虛津液濁泄故知非軀名曰居經經病血厥血厥者婦人平居無病忽如死人身不動搖目閉口噤重者不救輕者移時乃寤此名血厥由汗多血少陽氣獨上氣塞不行故身如死氣過血還陰陽復通故移時方寤婦人多有此症比癇症大不相同但此條混見大方全書之內未曾指出講明所以卒然莫救今特表而出之經曰諸乘寒者則為厥鬱冒不仁其脈微弱初或嘔吐便爾昏沉陰陽乖隔榮衛不和比之中風身不發熱喉無痰聲手不握搐為異耳急宜握住頂心發令人扶起不得平臥外用通關散吹鼻取嚏有嚏則吉無嚏則凶或以鐵稱錘燒紅入碗內以醋沃之熏鼻下醋氣入內透隔立蘇口噤不能灌藥者針少商及三陽五會等穴或以作筒吹其兩耳或以童便灌之切記不可灌熱湯蓋灌熱湯則血得熱而泛濫犯胃衝心多致不救心為君主心不受邪一絲血入心即死矣經所謂經水波濤而湧起也名曰血厥治宜花蕊石散童便調服或蘇合香丸醒後白薇湯八珍散歸脾湯調理也家祕曰經隧乖戾血上衝心所以神昏緩則不救治以八寶丹經水愆期歌經水違期號曰愆或多或少或流連過期澀少因無血熱盛脾虛則向前乍熱乍痛須細審適來適斷看風煙逾期五十經還漏室女停經有避年論經曰飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行故心脾和平則經候如常矣苟或飲食失節起居違宜脾胃虧損則經不調也趙養葵曰不及期來者有火也滋水則火自平矣六味丸如不及期而來多者本方加海螵蛸柴胡白芍如半月十日一來屬氣虛補中湯如過期不來者無火也本方加艾葉脈遲色淡加炮薑肉桂此其大略耳其間亦有不及期而無火者過期而有火者有過期而多者不及期而少者不可拘於一定當辨脈之遲數稟之虛實形之強弱年之多寡而施治之如肝脾熱者四物加減脾肺虛弱者補中益氣湯肝脾鬱結者歸脾湯怒動肝火者加味逍遙散肝腎陰虛者六味丸蓋脾為化生之源心統諸經之血而陽氣生於陰精故宜補心脾腎也脈寸關脈調和如故尺脈絶不至者當患少腹痛引腰痛氣滯上攻胸臆也寸口脈浮而弱浮則為虛弱則無血脈至狀如琴絃苦小腹痛月水不利孔竅生瘡少陰脈弱而微微則少血弱則發熱肝脈沉主月水不利腹脹滿腰間痛趕前先期而至曰趕前血熱陰虛土不堅怒氣傷肝及勞役固經涼血始安然四物三補丸落後只因血少故來遲澀少無痛大補之色淡脈虛皆不足養榮歸芍及參耆滋血湯過多陽氣乘陰血去多當歸飲子可調和勞傷衝任宜膠艾攝血參耆苓朮莎澀少澀少原來陰勝陽或臨經脈著寒涼若然不足宜滋補氣滯津虛另有方不通行後如何又不通冷凝熱結不相同避年血少居經等莫作尋常一例攻薛立齋曰經水陰血也屬衝任二脈上為乳汁下為月水故其為患有脾虛不能生血者調而補之脾鬱而血不行者解而補之胃火而血不成者清而補之脾胃虛損而血少者溫而補之勞傷心血者逸而補之怒氣傷肝者和而補之肺氣虛而不能行血者補土以生金腎水虛不能生肝而血少者補脾肺以滋化源而疾自愈難經曰損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精皆當審而治之不斷經水淋濁不肯除皆因氣血本元虛或緣房事傷衝任鬱怒憂思亦載書固經丸逾期七七陰陽數已終如何經脈復流通皆因憂怒兼勞役邪氣停留在子宮芩心丸避年斷續經期號避年要知處女屬先天一云經度隨年轉氣血循環合自然拱辰丹脈經曰有婦人將一女子年十五來診言年十四時經水自下今經反斷何也師曰若是夫人親女必夫人年十四時亦以經水下後斷所以此女亦至此而斷是為避年後當自下蓋其氣尚怯稟賦素弱而然也李時珍曰經水一年一度者亦為避年適來適斷經水將行忽著寒適來適斷不相安觸經感冒柴胡治更刺期門可瀉肝加味小柴胡湯婦人寒熱如瘧晝則明白夜則譫語胸脅脹滿乃因血去室空風邪乘虛而入名曰熱入血室當行不行二七天癸任脈通過期斷絶不來紅風寒驚恐並思慮養血清心勿誤攻柏子仁丸大凡天癸至早者性機巧至遲者性魯鈍通行則無病澀滯不行變成勞瘵者多矣經病疼痛歌臨病疼痛有多般不識根源治便難未至先疼因實積去空覺痛是虛寒復庵治血先調氣産寶臨經莫嗜酸氣滯風寒兼血澀更參脈證下湯丸論經水者行血氣通陰陽以榮於身者也若外虧衛氣充養內乏榮血灌溉而被風寒勞役經候欲行先身痛也其或風冷客於胞中而動衝任之脈故腹痛也脈沉緊細動皆主腹痛陽弦頭痛陰弦腹痛肝脈若弦月水不利腰腹疼痛月水不通繞臍寒疝痛其脈沉緊此由血積不散為氣所沖新血與故血相搏故痛腹痛腹痛雖云衝任傷須分氣血與陰陽風寒濕熱參虛實看脈推源用古方風冷經來衝任傷風冷腹內綿綿痛不停足冷脈遲頻欲嘔桂枝桃核及溫經溫經湯寒濕經水如同豆汁形腹中㽱痛不安寧脛浮兩尺皆沉細四物湯煎合五苓血澀臨經先有腹中疼血澀因而即不行漸漸痛來移趨下調榮順氣可和平八物湯氣滯氣滯胞門經不通腹中疼痛往來攻脈沉走注牽腰脅抑氣延胡大有功食積婦女炎天臨月經誤傷生冷忽然停後來欲至先疼痛琥珀延胡及胡苓小琥珀散虛痛經來腰腹痛悠悠過後緣何反不休脈弱痛綿手可按必然血少是根由八珍湯加延胡香附炮薑實痛痛陳攻衝血不行按之破滿手難迎便知裡實宣通好氣血流行痛自平瓦壟子丸玉燭散頭痛臨經頭痛著風寒莫作尋常一樣看發表必須兼養血一七五積自能安身痛臨經身痛如何斷或冒風邪氣血虛調衛祛風兼補血古方趁痛飲堪除腰痛經病如何腰亦疼只因兩腎系胞門內經具載今拈出化育根基在一元琥珀散失血心痛失血心疼人罕知只因血統在心脾去多治本歸脾好治標先將補血脾經病發熱歌勞熱神思多困倦客邪口燥及心煩內傷有瘀成潮熱外感無時熱又溫平昔經前實積看去多經後作虛論實宜清解虛溫補寒熱譫言另立門論王太僕曰如大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止是無火也當治其心如大熱而甚寒之不寒是無水也當助其腎心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱伏於內李氏曰潮熱有時為內傷為虛熱無時為外感為實虛者大溫經湯實者四物湯加柴胡黃芩經閉者滋血湯骨蒸者大胡連丸烏雞丸五心煩熱四物加胡連川連無汗者茯苓補心湯有汗者加味逍遙散脈洪數有力是為實熱細數無力即是虛熱浮主外邪沉乃里熱表裡虛實以此分別臟腑經絡具在脈訣平時發熱平時發熱必偏陽人瘦陰虛火自狂能戒五辛如淡食勝如煎服地黃湯臨經發熱血去陰虛內熱生口乾煩躁不和平行過初至須分治客實虛潮另有名勞熱因勞發熱為勞熱肢體痠痛盜汗多煩躁不寧神困倦急投良劑免沉疴午前熱屬氣分清心蓮子飲午後熱屬陰分地黃湯若勞心者天王補心丹勞力者加味逍遙散客熱客熱皆由元氣虛衛家淺薄外邪居心煩口渴肌膚燥加味逍遙治有餘良方曰經行體虛溫暖過度外邪乘之故曰客熱其狀上焦胸膈之間虛熱口燥心煩手足壯熱是也潮熱要知潮熱陽明實熱至如潮不失期若是太衝停瘀血桃仁承氣可行之實熱脈洪有力名為實熱在先前經未行便閉唇焦兼口渴可煎玉燭把衣更虛熱脈來無力便知虛陰不足兮氣有餘必是去多經水後六神補血自能除寒熱寒熱雖云外中風陰虛陽弱不相同更尋氣血分虛實寒熱交爭又一宗經曰陽虛則惡寒陰虛則發熱陽不足則先寒後熱陰不足則先熱後寒陰陽不調之故當分氣血虛實治之寸口脈微為陽不足則陰氣上入於陽中宜補中益氣湯尺部脈弱為陰不足則陽氣下陷於陰中宜益陰地黃丸若怒動肝火者小柴胡湯寒熱交爭生地黃丸崩漏歌陰虛陽搏謂之崩恚怒憂思風熱乘陰絡受傷血內溢脾家虧損外奔騰悲哀太過心胞絶涎滯中焦氣不增更有陰陽崩兩説須參脈症可為憑論經曰陰虛陽搏謂之崩又曰悲哀太過則心系急肺布葉舉而上焦不通熱氣在中故血走而崩也忽然大下謂之崩淋瀝不止謂之漏也脈仲景曰寸口脈微而緩微者衛氣疏疏則其膚空緩者胃弱不實則谷消而水化谷入於胃脈道乃行水入於經其血乃成榮盛則其膚必疏三焦絶經名曰血崩寸口脈弦而大弦則為減大則為芤減者為寒芤則為虛虛寒相搏此名曰革男子則亡血失精婦人則半産漏下尺脈急而弦大風邪入少陰之經女子則漏下赤白漏血不止脈小虛滑者生大緊實數者死日下赤白數升脈急疾者死遲者生浮者不治陰虛陽搏尺脈虛微陰不足寸如弦急陽有餘必然失血崩中症四物阿膠黑地榆漏久而虛者黑地黃丸勞傷衝任衝任原來主月經絡傷血溢不留停備金散子宜調服大劑芎歸極有靈涎郁胸膈痰涎凝滯郁胸中壅遏經隧氣不通血不歸經因漏下備金抑氣可收功風熱乘肝風熱乘肝血妄行頭痛脅痛目羞明莎柴四物焦荊芥一服教君疾自平烏金散思慮傷脾憂愁思慮總傷脾倦怠貪眠食不思坤土卑監難攝血歸脾加減最相宜暴怒傷陰怒氣傷肝血不藏忽然崩下甚倣徨青皮香附炮焦黑白芍芎歸及地黃元氣下陷血脫多時氣必虛陽生陰長理相宜肝能生血調脾胃歸草升柴參朮耆補中益氣湯經閉歌二陽之病發心脾血海無餘土已虧氣結痰凝良有説肝勞心損亦須知東垣指出三焦病學者宜將五臟推血滯血枯當有別通經不可浪施為論經曰月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也潔古云宜先降心火之劑後服五補丸衛生湯治脾以養其血經曰二陽之病發於心脾有不得隱曲女子不月其傳為風消為息奔者死不治經曰有病胸脅支滿妨於食病至則先聞腥臊臭出清液四肢清目眩時時前後血病名曰血枯東垣曰經閉不行有三脾胃久虛形體羸瘦氣血俱衰以致經水斷絶或因勞心心火上行月事不來胞脈閉也治宜安心補血瀉火則經自行此上焦心肺有熱而不行一也或病中消胃熱善飢漸瘦津液不生蓋經乃血脈津液所化津液既為熱爍肌肉漸瘦時見煩渴血海乾枯宜瀉胃之燥熱補益氣血則經自行此中焦胃熱而不行二也或心胞絡脈洪數時見大便閉小便難而經水斷絶血海乾枯治宜調血脈除胞絡中相火則經自行此下焦胞絡熱結而經不行三也脈寸脈弦關脈沉是肝病也兼主腹痛孔竅生瘡尺脈滑氣血實經不利尺脈絶不至兼主少腹引腰痛氣攻胸臆也少陰脈弱而微微則少血寸口脈浮而弱浮則為虛弱則無血脈來至如琴絃者苦少腹痛月水不利也肝脈沉主月水不利腰腹痛尺脈來而斷續者月水不利腹不通繞臍痛其脈沉緊此由寒氣客於血室血凝不行也血熱清熱瀉火出東垣病屬三焦必熱煩玉燭三和分上下經水調後必調元三和湯玉燭散二氣丸風冷熱則宜通冷則凝腹中瘕聚結如冰或緣勞役兼驚恐久則傷肝寒熱增千金桃仁丸晞露丸痰阻痰滯胞門氣不清久而食少熱寒生肥人血海偏脂滿去積消痰經自行瓦壟丸血結血結胞中病鬱陶精神減少欲成勞寒宜三壘三方治熱用羅君血極膏氣滯婦女偏多執性情哀懷隱曲不舒伸停經大半由於此琥珀當歸效若神琥珀散當歸散心虛婺婦宮娥及女尼心思散耗致肝虧須培血脈調榮衛柏子仁丸最合宜茯苓補心湯肝勞肝勞支滿妨於食時覺喉間有臭腥脅痛目眩或唾血蘆茹烏賊載於經經閉成勞室女停經病不輕漸成勞瘵熱寒並急宜艾炎投符藥若得經通疾自平澤蘭湯柏子仁丸生地黃丸勞瘵多端不等論先須去病後調元骨蒸冷熱傳尸㾏若要尋精另一門秦艽鱉甲散獺肝丸北斗符取勞蟲方灸四花穴腰俞夢與鬼交歌元神虛損被邪侵鬼魅交通莫可禁恍惚昏迷言語亂調肝養血及清心論人稟五行秀氣而生五臟神氣而養若調理失節氣血衰微或思想過度神不守舍則邪乘虛而入其症隱避而不欲見人時獨言笑或時悲泣面色不變是也脈其脈沉遲而伏或如鳥啄或綿綿而來不知度數或乍大乍小乍短乍長皆邪脈也方茯神散茯神茯苓人參赤小豆石菖蒲水煎服妙香散茯神茯苓黃耆遠志山藥各一兩甘草人參桔梗各五錢硃砂三錢木香二錢五分麝香一錢酒服二錢鹿角散生鹿角為末酒服三錢日三服桃仁丸辰砂檳榔當歸桃仁各三錢阿魏一錢沉香麝香一錢煉蜜丸梧子大酒服十丸秦承祖灸鬼哭穴病人兩手拇指相併線扎緊合縫處半肉半甲間灸七壯必要四人四角一齊默火方妙孫真人有十三鬼穴黃帝灸法上唇里而中央肉弦上一肚如小麥大積聚癥瘕腸覃石瘕歌痃癖聚瘕痞疝症血凝痰氣食兼成難經五積由於臟六聚相傳腑所生腸覃經行氣分病石瘕不月血相併青黃燥血脂狐鱉蝨發蛇魚亦瘕名論經曰腸覃者寒氣客於腸外與衛氣相搏氣不得營因而所繫癖而內著惡氣乃起息肉乃生其始大如雞卵稍以益大至其成如懷子之狀按之則堅推之則移月事以時下此腸覃也氣病而血不病也晞露丸石瘕者生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下二者皆生於女子可導而下五積者五臟所生心曰伏梁肝曰肥氣脾曰痞氣肺曰息賁腎曰奔豚六聚者六腑所生也痃生臍傍癖在兩肋痞在胸前疝居小腹食症血症氣癖瘧癖又有龍蛇魚鱉肉發蝨瘕等皆事出偶爾飲食間誤中之留聚腹中假血而成自有活性如永徽僧病噎腹中一物如魚之類是也他如敗梳治蝨瘕銅屑治龍瘕麴櫱治米瘕石灰治酒瘕茶泥治蛭瘕可以理解也皆因飲食不節起居失宜臟腑虧損氣血乖戾痰涎凝結陰陽受傷經絡隧道循行失度所以發作則痛甚則欲死皆血之所為也脈寸口沉而橫脅下有積痛六脈沉澀皆主積痛浮牢數緊亦主積聚少陰浮緊緊則腹痛半産浮則亡血惡寒絶産弦急者可治虛弱者不治方瓦壟子丸五積丸桃仁煎晞露丸李子豫八毒赤丸太乙神明陷冰丸針灸氣海在臍下一寸半天樞在臍旁二寸三報在巨闕下一寸章門在季脅端胃脘穴在臍上四寸臟躁悲傷歌婦人無故忽悲傷不是神靈不是狂臟躁欠伸誰識得長沙傳下麥甘湯論婦人臟躁悲傷欲哭像如鬼神所作數欠身甘草小麥大棗湯主之蓋心虛則悲傷悲傷則心動心動則宗脈感而液道開令人欲哭過甚則宗氣消而榮衛不利陰陽相引而作欠伸也産寶曰喜屬陽心主之怒屬陰肝主之婦人稟性陰柔故喜常少而怒常多或悲泣不止皆陰類也有似神靈所憑皆因所欲不遂思極傷心故也脈精氣並於肺則悲脈必浮澀而短設或洪大肺被火克也方甘麥大棗湯甘草三兩小麥一升大棗十枚水六升煮三升去渣分三次服立齋曰前症有寒水攻心者有肺受風邪者治當審察無執一方咽中如炙胬歌只因經絡著風寒痰結咽中吞吐難久久不除成噎隔早宜四七破棺丹論仲景曰婦人咽中炙胬半夏厚朴湯主之孫真人曰咽中帖帖如有炙肉吐之不出吞之不下含生薑片五十日愈以意逆之當是寒傷經絡氣血不和浮於咽中婦人血分受寒多積冷氣故有此症豫用破棺丹噙化頻咽之曾治數人多效蓋喉侯也喉出天氣咽者咽也咽出地氣故喉為呼吸之門咽乃水穀之路其或憂思內結風冷外侵痰氣隔塞逆於喉嚨妨礙飲食久之而成翻胃噎隔者有矣脈浮滑風痰沉澀氣鬱弦數緊澀終為不吉方半夏厚朴湯半夏一升厚朴三兩茯苓四兩生薑五兩紫蘇二兩水七升煮四升分四服每日一服四七湯即前方而分兩不同二氣散山梔炒乾薑炮等分為末砂仁湯下二錢脬轉歌忍尿持重入房中了戾膀胱溺不通莫把藥湯增水泛沉香琥珀有神功論仲景曰婦人病飲食如故煩熱不得臥而反倚息者此轉脬不得溺也以脬繫了戾故致此病宜利小便則愈腎氣丸主之夫脬受水液氣不轉行則小腸滿脹或忍小便飽食用力或忍便行房或忍便疾行或忍便持重今脬繫了戾屈抑而不得舒張故小便不下其症臍下急痛煩悶汗出氣逆奔迫內外壅塞脹滿不通此脬系轉戾不通非湯藥所能治法當行其氣氣化則能出矣沉香琥珀丸主之外用小麥杆煎湯熏洗甲乙經曰脬轉不得溺關元主之脈右手澀小左手急大者蔥白葵子桔皮湯方沉香琥珀丸沉香牙皂琥珀等分為末飯丸益元散為衣溫酒服二錢強忍小便氣逆不通困篤欲死方滑石二兩發一兩燒桃根白皮煎湯調服一錢陰中諸病歌厥陰肝脈入陰中抵器連陰及子宮作癢生瘡因濕熱腫而堅痛受寒風脾虛下陷宜升舉鬱結攻衝可宣通更