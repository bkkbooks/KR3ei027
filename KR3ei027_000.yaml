body:
  text: 敘周禮醫師之政令邦有疾則使分而治之自四海九州莫不仰瞻其盛所以民無夭札並樂升平逮三代降而廢棄不講而漢史郭玉魏志華他晉皇甫士安孫思邈得龍禁方皆非常人也五代至唐而恆不復世觀宜乎居世之士不能留神醫學而斯道之難明也今吾聖天子廢政施仁睿智好學經史百家博極群書特諭太醫將靈素金匱藥性定為三書一時醫林大振教飭極其精風雅極其盛咸登春臺而躋壽域被樂育而歌不老矣甲辰春杪楚林王甥挈伴心培葉子來京就試葉子復出其尊人手著脈鏡及十三科指掌纘緒內經方法金匱而藥性志在是矣一覽明瞭如指諸掌韻葉回言使讀者開卷對鏡心領神會鬚眉相映毫髮炳然亦可云應運挺生仰體大聖人愛育黎元之至意播九州四海生生不已豈僅民無夭札抑爾共樂休明之盛也夫雍正甲辰春五月成都張鵬翮書凡例是編首則總括一歌次則序諸家之論次則脈次則方使人一展卷焉歌以志其大綱論以詳其條目脈以驗其相應方以治其沉疴歌論脈方恍然在目了無疑義庶得附名於指掌云耳是編以女科為首者宗千金方也蓋以婦人為生化之源自無而有人道之始也調經種子胎前臨産産後凡五其他傷寒雜證另有全書茲不多贅是集以帶下為始者尊扁鵲也況帶下者經必不調亦調經中之一事也而且婦人患帶下者十居八九但閏閣嬌羞不以語人耳如經不調病名也而所以致其不調者則非一端苟不辨其為七情為六淫為寒為熱為虛為實為痰凝為氣滯為思想為房勞為先天為病後種種不同如何用藥寧無虛虛實實之弊乎脈症詳明庶幾近理婦人每多慈戀愛憎恚怒憂思情性執著偏僻堅牢所以比男子難療遂致七情內傷六淫外侵脾胃虧損任苒成病必須辨其在臟在腑在經絡在血脈在肌膚在骨髓在氣分在血分有陰有陽有虛有實平時熟習諸書自然見理分明臨症不模糊矣女科書之行於世者惟婦人良方濟陰綱目女科經綸而已此外不可多得即如邯鄲遺稿産寶新書外臺祕要褚氏遺書亦未易見蓁不惜重價求之數十年始得寓目更於大全書中逐一拈出參以己意積成卷秩因家貧不能全刻刪去其半如回生丹資生湯安産圖藏衣法較之他書自有徑庭雖不敢杜撰遺譏亦不致隨風附和也無子者雖有年命相沖風水所招二説其實疾病使然耳還宜服藥為是譬如田中芟去草蔓饒沃其土及使下種天雨既降五穀勃然而生矣而其大要尤在行仁積德即如傷胎破卵之細亦物為之臨産古有安産藏衣之法今人盡皆刪去不思誕降之時正陰陽交代之際豈無鬼神運用於其間哉今遵外臺補之不惟便於採用抑亦宗前啓後也博雅之士不厭其多産時服獨參湯佛手散極有神效産後宜服資生湯回生丹蓁每用之雖危險之症十救五六嘗細究其方原出羅謙甫所制血極膏東垣稱為女科聖藥而又合琥珀散又合二味參蘇飲又合仲景紅藍花酒是合四方而成一方正所謂復方也妙在攻補兼行制度有法何諸書失載不傳耶今悉補之産育乃彝倫日用之常人皆有之每見分娩之際倉忙無措調理失宜而死者指不勝屈豈皆正命夫乃嚴牆豫姪婦亦羅其厄於是摘聖賢之珠玉發天地之靈奇不惜物議不量才力刻以問世志在濟人好道君子置之案頭朝夕玩熟轉相救人則其好生之德寧不在作者之上哉是集之後意欲以十三科之書各集一套次第問世但不知此身在天地間還有幾年更不知仁人君子肯教我以相成否耶
